<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>VAJIRA MD LITE · Tutorial</title>
    <style>
        /* ───────── RESET & BASE ───────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red: #e01a1a;
            --red-dark: #991111;
            --red-glow: rgba(224, 26, 26, 0.3);
            --bg: #080808;
            --card-bg: rgba(12, 12, 12, 0.85);
            --text: #e8e8e8;
            --text-muted: #888;
            --border: rgba(255, 255, 255, 0.05);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ───────── ANIMATED TECH BACKGROUND ───────── */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                linear-gradient(rgba(224, 26, 26, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(224, 26, 26, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .bg-grid::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(224, 26, 26, 0.06), transparent 70%);
        }

        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow.g1 {
            width: 500px;
            height: 500px;
            background: rgba(224, 26, 26, 0.08);
            top: -15%;
            right: -10%;
            animation: floatGlow 25s infinite alternate ease-in-out;
        }
        .bg-glow.g2 {
            width: 400px;
            height: 400px;
            background: rgba(150, 0, 0, 0.06);
            bottom: -10%;
            left: -10%;
            animation: floatGlow 30s infinite alternate-reverse ease-in-out;
        }
        .bg-glow.g3 {
            width: 300px;
            height: 300px;
            background: rgba(224, 26, 26, 0.04);
            top: 40%;
            left: 50%;
            animation: floatGlow 20s infinite alternate ease-in-out;
        }
        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(40px, -30px) scale(1.2);
            }
            100% {
                transform: translate(-20px, 40px) scale(0.8);
            }
        }

        /* floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(224, 26, 26, 0.3);
            border-radius: 50%;
            animation: particleDrift linear infinite;
        }
        @keyframes particleDrift {
            0% {
                transform: translateY(100vh) translateX(0px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(40px);
                opacity: 0;
            }
        }

        /* ───────── LOADING SCREEN ───────── */
        #loadingWrapper {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), visibility 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #loadingWrapper.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-inner {
            text-align: center;
            position: relative;
        }

        .loader-logo {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 120px;
            height: 120px;
            margin-bottom: 28px;
        }
        .loader-logo .ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid transparent;
        }
        .loader-logo .ring.r1 {
            inset: -8px;
            border-top-color: var(--red);
            border-right-color: var(--red);
            animation: spinRing 2.8s infinite linear;
        }
        .loader-logo .ring.r2 {
            inset: -18px;
            border-bottom-color: rgba(224, 26, 26, 0.3);
            border-left-color: rgba(224, 26, 26, 0.3);
            animation: spinRing 3.6s infinite reverse linear;
        }
        .loader-logo .ring.r3 {
            inset: -28px;
            border-top-color: rgba(224, 26, 26, 0.15);
            border-right-color: rgba(224, 26, 26, 0.15);
            animation: spinRing 4.8s infinite linear;
        }
        @keyframes spinRing {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loader-logo .v {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, var(--red), var(--red-dark));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 44px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(224, 26, 26, 0.5);
            box-shadow: 0 0 60px rgba(224, 26, 26, 0.2);
            animation: logoPulse 2.8s infinite alternate;
        }
        @keyframes logoPulse {
            0% {
                box-shadow: 0 0 40px rgba(224, 26, 26, 0.15);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 80px rgba(224, 26, 26, 0.35);
                transform: scale(1.03);
            }
        }

        .loader-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 35%, var(--red) 70%, #ff5555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradShift 3.5s ease-in-out infinite;
        }
        .loader-sub {
            color: #555;
            font-size: 12px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 32px;
            font-weight: 300;
        }
        @keyframes gradShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .loader-bar {
            width: 280px;
            max-width: 80vw;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .loader-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--red-dark), var(--red), #ff5555, var(--red));
            background-size: 300% 100%;
            border-radius: 10px;
            transition: width 0.12s linear;
            animation: barShimmer 1.8s infinite linear;
        }
        @keyframes barShimmer {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 300% 0%;
            }
        }

        .loader-pct {
            margin-top: 12px;
            font-size: 12px;
            color: #555;
            letter-spacing: 2px;
        }
        .loader-pct span {
            color: var(--red);
            font-weight: 700;
            font-size: 14px;
        }

        /* ───────── TUTORIAL ───────── */
        #tutorialWrapper {
            display: none;
            width: 100%;
            max-width: 720px;
            position: relative;
            z-index: 1;
            padding: 4px 0;
        }
        #tutorialWrapper.active {
            display: block;
            animation: wrapperFade 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes wrapperFade {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .tut-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px 36px 32px;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            position: relative;
            overflow: hidden;
        }
        .tut-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), #ff5555, var(--red), transparent);
            background-size: 300% 100%;
            animation: barShimmer 3s infinite linear;
        }
        .tut-card::after {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 60%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(224, 26, 26, 0.03), transparent 70%);
            pointer-events: none;
        }

        /* header */
        .tut-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 12px;
        }
        .tut-step {
            font-size: 11px;
            color: #555;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .tut-step strong {
            color: var(--red);
            font-weight: 700;
            font-size: 14px;
        }

        .tut-dots {
            display: flex;
            gap: 10px;
        }
        .tut-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .tut-dots span.active {
            background: var(--red);
            transform: scale(1.3);
            box-shadow: 0 0 24px var(--red-glow);
        }
        .tut-dots span.active::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid var(--red-glow);
            animation: dotRipple 2s infinite;
        }
        @keyframes dotRipple {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2.2);
                opacity: 0;
            }
        }

        /* body — paragraph style */
        .tut-body {
            position: relative;
            z-index: 1;
            min-height: 200px;
            padding: 4px 0 8px;
        }
        .tut-body>* {
            animation: contentIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes contentIn {
            0% {
                opacity: 0;
                transform: translateX(20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .tut-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 18px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        .tut-title .accent {
            color: var(--red);
        }

        .tut-text {
            font-size: 16px;
            line-height: 1.8;
            color: #c0c0c0;
            margin-bottom: 16px;
            font-weight: 400;
        }
        .tut-text strong {
            color: #fff;
            font-weight: 600;
        }
        .tut-text .highlight {
            color: var(--red);
            font-weight: 600;
        }
        .tut-text .muted {
            color: #666;
        }

        /* info blocks — inline paragraph style */
        .info-inline {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 24px;
            padding: 16px 20px;
            margin: 16px 0 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .info-inline .item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 14px;
        }
        .info-inline .item .label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-inline .item .value {
            color: #fff;
            font-weight: 600;
        }
        .info-inline .item .value .muted {
            color: #666;
            font-weight: 400;
        }

        .feature-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 14px 0 10px;
        }
        .feature-pills .pill {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 6px 16px 6px 14px;
            font-size: 13px;
            color: #bbb;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .feature-pills .pill .icon {
            color: var(--red);
        }
        .feature-pills .pill:hover {
            border-color: rgba(224, 26, 26, 0.2);
            background: rgba(224, 26, 26, 0.05);
            transform: translateY(-1px);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(76, 175, 80, 0.06);
            border: 1px solid rgba(76, 175, 80, 0.12);
            border-radius: 12px;
            color: #4caf50;
            font-size: 14px;
            margin-top: 10px;
        }
        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulseDot 1.8s infinite;
        }
        @keyframes pulseDot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.6);
            }
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin: 18px 0 16px;
        }

        /* ─── ACCEPT BOX ─── */
        .accept-box {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            margin: 20px 0 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .accept-box:hover {
            border-color: rgba(224, 26, 26, 0.2);
            background: rgba(224, 26, 26, 0.03);
        }
        .accept-box input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--red);
            cursor: pointer;
            flex-shrink: 0;
            border-radius: 4px;
            transition: transform 0.2s;
        }
        .accept-box input[type="checkbox"]:checked {
            transform: scale(1.1);
        }
        .accept-box label {
            font-size: 15px;
            color: #bbb;
            cursor: pointer;
            user-select: none;
            line-height: 1.4;
        }
        .accept-box label strong {
            color: #fff;
        }

        .btn-confirm {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.25;
            pointer-events: none;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .btn-confirm.enabled {
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 6px 32px rgba(224, 26, 26, 0.25);
        }
        .btn-confirm.enabled:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 44px rgba(224, 26, 26, 0.35);
            background: linear-gradient(135deg, #f02626, #aa0000);
        }
        .btn-confirm.enabled:active {
            transform: scale(0.97);
        }
        .btn-confirm::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .btn-confirm.enabled:hover::after {
            transform: translateX(100%);
        }

        .dashboard-hint {
            text-align: center;
            font-size: 12px;
            color: #444;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .dashboard-hint span {
            color: #666;
        }

        /* ─── NAV ─── */
        .tut-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            padding-top: 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 12px;
        }
        .btn-nav {
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.3px;
            min-width: 100px;
        }
        .btn-nav:active {
            transform: scale(0.95);
        }
        .btn-prev {
            background: rgba(255, 255, 255, 0.04);
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .btn-prev:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateX(-3px);
        }
        .btn-next {
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            color: #fff;
            box-shadow: 0 4px 24px rgba(224, 26, 26, 0.2);
        }
        .btn-next:hover {
            transform: translateX(3px);
            box-shadow: 0 6px 32px rgba(224, 26, 26, 0.3);
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .tut-card {
                padding: 28px 20px 24px;
                border-radius: 22px;
            }
            .tut-title {
                font-size: 22px;
            }
            .tut-text {
                font-size: 15px;
                line-height: 1.7;
            }
            .loader-title {
                font-size: 26px;
                letter-spacing: 2px;
            }
            .loader-logo {
                width: 90px;
                height: 90px;
            }
            .loader-logo .v {
                width: 62px;
                height: 62px;
                font-size: 34px;
            }
            .loader-logo .ring.r1 {
                inset: -4px;
            }
            .loader-logo .ring.r2 {
                inset: -12px;
            }
            .loader-logo .ring.r3 {
                inset: -20px;
            }
            .info-inline {
                padding: 12px 16px;
                gap: 6px 16px;
            }
            .info-inline .item {
                font-size: 13px;
            }
            .btn-nav {
                padding: 10px 20px;
                min-width: 80px;
                font-size: 13px;
            }
            .tut-header {
                margin-bottom: 20px;
            }
            .feature-pills .pill {
                font-size: 12px;
                padding: 5px 12px 5px 10px;
            }
            .accept-box {
                padding: 14px 16px;
            }
            .accept-box label {
                font-size: 14px;
            }
            .btn-confirm {
                font-size: 15px;
                padding: 14px;
            }
            .dashboard-hint {
                font-size: 11px;
            }
        }

        @media (max-width: 400px) {
            .tut-card {
                padding: 20px 14px 18px;
                border-radius: 18px;
            }
            .tut-title {
                font-size: 19px;
            }
            .tut-text {
                font-size: 14px;
            }
            .btn-nav {
                padding: 8px 14px;
                min-width: 60px;
                font-size: 12px;
            }
            .tut-step {
                font-size: 10px;
                letter-spacing: 2px;
            }
            .tut-dots span {
                width: 8px;
                height: 8px;
            }
            .loader-title {
                font-size: 20px;
            }
            .loader-logo {
                width: 72px;
                height: 72px;
            }
            .loader-logo .v {
                width: 50px;
                height: 50px;
                font-size: 28px;
            }
            .info-inline .item {
                font-size: 12px;
            }
            .info-inline .item .label {
                font-size: 10px;
            }
        }

        @media (min-width: 1024px) {
            .tut-card {
                padding: 48px 44px 36px;
                border-radius: 32px;
            }
            .tut-title {
                font-size: 30px;
            }
            .tut-text {
                font-size: 17px;
                line-height: 1.9;
            }
            .btn-nav {
                padding: 14px 40px;
                font-size: 15px;
            }
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--red);
        }
    </style>
</head>
<body>

    <!-- ─── ANIMATED BACKGROUND ─── -->
    <div class="bg-grid"></div>
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
    <div class="bg-glow g3"></div>
    <div class="particles" id="particles"></div>

    <!-- ═══════════════ LOADING ═══════════════ -->
    <div id="loadingWrapper">
        <div class="loader-inner">
            <div class="loader-logo">
                <div class="ring r1"></div>
                <div class="ring r2"></div>
                <div class="ring r3"></div>
                <div class="v">V</div>
            </div>
            <div class="loader-title">VAJIRA MD LITE</div>
            <div class="loader-sub">WhatsApp Bot · Tutorial</div>
            <div class="loader-bar">
                <div class="fill" id="progressFill"></div>
            </div>
            <div class="loader-pct"><span id="progressPct">0%</span> &nbsp;—&nbsp; loading experience</div>
        </div>
    </div>

    <!-- ═══════════════ TUTORIAL ═══════════════ -->
    <div id="tutorialWrapper">
        <div class="tut-card">

            <div class="tut-header">
                <span class="tut-step">Step <strong id="stepNum">1</strong> <span style="color:#444;">/ 4</span></span>
                <div class="tut-dots" id="dotsContainer">
                    <span class="active"></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <div class="tut-body" id="tutBody">
                <!-- rendered by JS -->
            </div>

            <div class="tut-nav">
                <button class="btn-nav btn-prev" id="prevBtn">← Back</button>
                <button class="btn-nav btn-next" id="nextBtn">Next →</button>
            </div>

        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  PARTICLES
        // ═══════════════════════════════════════════════════════════

        (function createParticles() {
            const container = document.getElementById('particles');
            const count = 25;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = (1 + Math.random() * 2) + 'px';
                p.style.height = p.style.width;
                p.style.animationDuration = (15 + Math.random() * 25) + 's';
                p.style.animationDelay = (Math.random() * 20) + 's';
                p.style.opacity = 0.2 + Math.random() * 0.3;
                container.appendChild(p);
            }
        })();

        // ═══════════════════════════════════════════════════════════
        //  DATA — paragraph-style descriptions
        // ═══════════════════════════════════════════════════════════

        const tabs = [{
            id: 'about',
            render: () => `
                <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
                    <div style="width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 40% 35%, var(--red, #e01a1a), #991111);display:flex;justify-content:center;align-items:center;flex-shrink:0;box-shadow:0 0 30px rgba(224,26,26,0.15);">
                        <span style="font-size:28px;font-weight:900;color:#fff;">V</span>
                    </div>
                    <div>
                        <div style="font-size:18px;font-weight:800;color:#fff;">VAJIRA MD LITE</div>
                        <div style="color:#666;font-size:11px;letter-spacing:2px;text-transform:uppercase;">WhatsApp Automation Bot</div>
                    </div>
                </div>

                <p class="tut-text">
                    <strong>Developer:</strong> Vajira Rathnayaka &nbsp;·&nbsp; <strong>Age:</strong> 23 &nbsp;·&nbsp; <strong>Village:</strong> Balangoda<br>
                    <strong>Country:</strong> Sri Lanka &nbsp;·&nbsp; <strong>Version:</strong> 2.4.0
                </p>

                <p class="tut-text">
                    VAJIRA MD LITE is a powerful WhatsApp automation bot built with <strong>Node.js</strong> and the
                    <strong>Baileys</strong> library. It handles <span class="highlight">auto‑reply</span>, media sending,
                    voice notes, TikTok downloads, and much more — all from your WhatsApp number.
                </p>

                <div class="feature-pills">
                    <span class="pill"><span class="icon">⚡</span> Ultra‑fast</span>
                    <span class="pill"><span class="icon">🔒</span> Secure</span>
                    <span class="pill"><span class="icon">🎵</span> Auto Voice</span>
                    <span class="pill"><span class="icon">📱</span> Multi‑device</span>
                    <span class="pill"><span class="icon">📊</span> Analytics</span>
                    <span class="pill"><span class="icon">🔄</span> Auto‑Retry</span>
                </div>

                <p class="tut-text" style="font-size:13px;color:#555;margin-top:4px;">
                    💡 This tutorial walks you through every feature — all information is for demonstration.
                </p>
            `
        }, {
            id: 'settings',
            render: () => `
                <h2 class="tut-title">Bot Settings <span class="accent">&amp; OTP Login</span></h2>

                <p class="tut-text">
                    To start using the bot, you need to connect your WhatsApp number. The login process is
                    simple and secure, using a <span class="highlight">one‑time password (OTP)</span> sent directly
                    to your WhatsApp.
                </p>

                <div class="info-inline">
                    <span class="item"><span class="label">📞 Connected Number</span> <span class="value">+94 71 234 5678</span></span>
                    <span class="item"><span class="label">🔐 OTP Code</span> <span class="value">123456 <span class="muted">(demo)</span></span></span>
                </div>

                <p class="tut-text">
                    <strong>How the OTP flow works:</strong><br>
                    1. Enter your WhatsApp number (with country code).<br>
                    2. Tap <span class="highlight">Request OTP</span> — a 6‑digit code is sent to your WhatsApp.<br>
                    3. Enter the received code to verify and log in.<br><br>
                    Once logged in, the bot stores your session securely for uninterrupted use.
                </p>

                <div class="feature-pills">
                    <span class="pill"><span class="icon">🎤</span> Auto Voice</span>
                    <span class="pill"><span class="icon">📨</span> Auto Reply</span>
                    <span class="pill"><span class="icon">📊</span> Analytics</span>
                    <span class="pill"><span class="icon">🔐</span> Session Storage</span>
                </div>
            `
        }, {
            id: 'autosender',
            render: () => `
                <h2 class="tut-title">Auto Sender <span class="accent">Song &amp; TikTok</span></h2>

                <p class="tut-text">
                    Configure automated sending of <strong>songs</strong> or <strong>TikTok</strong> content.
                    The bot sends media to any JID with your custom caption, interval, and quality settings.
                </p>

                <div class="info-inline">
                    <span class="item"><span class="label">📱 Sender Number</span> <span class="value">+94 71 234 5678</span></span>
                    <span class="item"><span class="label">📂 Type</span> <span class="value">🎵 Audio / Song</span></span>
                </div>
                <div class="info-inline" style="margin-top:-6px;">
                    <span class="item" style="flex:1;min-width:200px;"><span class="label">📍 JID ID</span> <span class="value">94712345678@s.whatsapp.net <span class="muted">(target)</span></span></span>
                </div>
                <div class="info-inline" style="margin-top:-6px;">
                    <span class="item" style="flex:1;"><span class="label">✏️ Caption</span> <span class="value">Check this out! 🔥</span></span>
                </div>
                <div class="info-inline" style="margin-top:-6px;flex-wrap:wrap;">
                    <span class="item"><span class="label">🎚️ Audio Quality</span> <span class="value">Medium</span></span>
                    <span class="item"><span class="label">⏱️ Interval</span> <span class="value">30 <span class="muted">sec</span></span></span>
                    <span class="item"><span class="label">🔑 Keywords</span> <span class="value">music, viral</span></span>
                </div>

                <div class="status-badge">
                    <span class="dot"></span>
                    <span>Ready to send — all settings are saved in this demo</span>
                </div>

                <p class="tut-text" style="font-size:14px;color:#666;margin-top:10px;">
                    <strong>Note:</strong> To use this feature, first log in with your number (OTP step).
                    The bot will then use the configured sender number.
                </p>
            `
        }, {
            id: 'privacy',
            render: () => `
                <h2 class="tut-title">Privacy <span class="accent">&amp; Safety</span></h2>

                <p class="tut-text">
                    <strong>🛡️ VAJIRA MD</strong> is built with <span class="highlight">privacy</span> and
                    <span class="highlight">ultra‑fast</span> performance at its core. Your data stays secure
                    and your account is protected from bans.
                </p>

                <div class="feature-pills">
                    <span class="pill"><span class="icon">🚫</span> Anti‑Ban</span>
                    <span class="pill"><span class="icon">⚡</span> Ultra‑Fast</span>
                    <span class="pill"><span class="icon">🔐</span> End‑to‑End</span>
                    <span class="pill"><span class="icon">🔄</span> Auto‑Retry</span>
                    <span class="pill"><span class="icon">🛡️</span> No Logs</span>
                    <span class="pill"><span class="icon">📡</span> 99.9% Uptime</span>
                </div>

                <p class="tut-text" style="font-size:14px;color:#888;">
                    ✅ By accepting, you agree that you own the connected number and will use this bot
                    responsibly and in accordance with WhatsApp's terms.
                </p>

                <div class="accept-box" id="acceptBox">
                    <input type="checkbox" id="acceptCheck">
                    <label for="acceptCheck">I accept the <strong>Terms of Service</strong> and <strong>Privacy Policy</strong></label>
                </div>

                <button class="btn-confirm" id="confirmBtn">✅ Confirm &amp; Open Dashboard</button>
                <div class="dashboard-hint">⚡ Dashboard will open at <span>/dashboard.html</span></div>
            `
        }];

        // ═══════════════════════════════════════════════════════════
        //  STATE
        // ═══════════════════════════════════════════════════════════

        let currentTab = 0;

        const loadingWrapper = document.getElementById('loadingWrapper');
        const tutorialWrapper = document.getElementById('tutorialWrapper');
        const progressFill = document.getElementById('progressFill');
        const progressPct = document.getElementById('progressPct');
        const stepNum = document.getElementById('stepNum');
        const dotsContainer = document.getElementById('dotsContainer');
        const tutBody = document.getElementById('tutBody');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // ═══════════════════════════════════════════════════════════
        //  LOADING
        // ═══════════════════════════════════════════════════════════

        function simulateLoading() {
            const duration = 2600;
            const interval = 40;
            const steps = duration / interval;
            let step = 0;

            const timer = setInterval(() => {
                step++;
                const pct = Math.min(100, Math.round((step / steps) * 100));
                progressFill.style.width = pct + '%';
                progressPct.textContent = pct + '%';

                if (pct >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        loadingWrapper.classList.add('hidden');
                        tutorialWrapper.classList.add('active');
                        renderTab(0);
                    }, 400);
                }
            }, interval);
        }

        // ═══════════════════════════════════════════════════════════
        //  RENDER
        // ═══════════════════════════════════════════════════════════

        function renderTab(index) {
            const tab = tabs[index];
            if (!tab) return;

            stepNum.textContent = index + 1;

            const dots = dotsContainer.querySelectorAll('span');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            tutBody.innerHTML = tab.render();

            prevBtn.style.display = index === 0 ? 'none' : 'inline-block';
            nextBtn.textContent = index === tabs.length - 1 ? '🏁 Finish' : 'Next →';

            // Last tab: checkbox + confirm
            if (index === 3) {
                const acceptCheck = document.getElementById('acceptCheck');
                const confirmBtn = document.getElementById('confirmBtn');
                const acceptBox = document.getElementById('acceptBox');

                function updateConfirm() {
                    if (acceptCheck && acceptCheck.checked) {
                        confirmBtn.classList.add('enabled');
                    } else {
                        confirmBtn.classList.remove('enabled');
                    }
                }

                if (acceptCheck) {
                    acceptCheck.onchange = updateConfirm;
                    if (acceptBox) {
                        acceptBox.onclick = function(e) {
                            if (e.target.tagName !== 'INPUT') {
                                acceptCheck.checked = !acceptCheck.checked;
                                updateConfirm();
                            }
                        };
                    }
                }

                if (confirmBtn) {
                    confirmBtn.onclick = function() {
                        if (acceptCheck && acceptCheck.checked) {
                            confirmBtn.textContent = '⏳ Redirecting...';
                            confirmBtn.classList.remove('enabled');
                            confirmBtn.style.opacity = '0.5';
                            setTimeout(() => {
                                window.location.href = '/dashboard.html';
                            }, 700);
                        }
                    };
                }

                updateConfirm();
            }
        }

        // ── Navigation ──
        function goToTab(index) {
            if (index < 0 || index >= tabs.length) return;
            currentTab = index;
            renderTab(index);
        }

        prevBtn.onclick = () => {
            if (currentTab > 0) goToTab(currentTab - 1);
        };

        nextBtn.onclick = () => {
            if (currentTab < tabs.length - 1) {
                goToTab(currentTab + 1);
            } else {
                const btn = document.getElementById('confirmBtn');
                if (btn) btn.click();
            }
        };

        // ── Keyboard ──
        document.addEventListener('keydown', (e) => {
            if (!tutorialWrapper.classList.contains('active')) return;
            if (e.key === 'ArrowRight' || e.key === 'Enter') {
                e.preventDefault();
                nextBtn.click();
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevBtn.click();
            }
        });

        // ── Touch swipe (simple) ──
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', (e) => {
            if (!tutorialWrapper.classList.contains('active')) return;
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextBtn.click();
                else prevBtn.click();
            }
        });

        // ═══════════════════════════════════════════════════════════
        //  START
        // ═══════════════════════════════════════════════════════════

        simulateLoading();
    </script>
</body>
</html>
