<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAJIRA MD LITE · Tutorial</title>
    <style>
        /* ───────── RESET & BASE ───────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ───────── ANIMATED BACKGROUND ───────── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a0505 0%, #0a0a0a 70%);
            overflow: hidden;
        }
        .bg-canvas .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: orbFloat 20s infinite alternate ease-in-out;
        }
        .bg-canvas .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: #cc0000;
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }
        .bg-canvas .orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: #880000;
            bottom: -10%;
            right: -10%;
            animation-duration: 20s;
            animation-delay: 3s;
        }
        .bg-canvas .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: #ff3333;
            top: 40%;
            left: 60%;
            animation-duration: 18s;
            animation-delay: 5s;
            opacity: 0.2;
        }
        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(60px, -40px) scale(1.1);
            }
            66% {
                transform: translate(-30px, 50px) scale(0.9);
            }
            100% {
                transform: translate(40px, -20px) scale(1.05);
            }
        }

        /* ───────── LOADING WRAPPER ───────── */
        #loadingWrapper {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s ease;
        }
        #loadingWrapper.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-content {
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
        }

        /* V Logo with ring */
        .v-logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }
        .v-logo-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #cc0000;
            border-right-color: #ff3333;
            animation: spinRing 3s infinite linear;
        }
        .v-logo-ring:nth-child(2) {
            inset: -20px;
            border-top-color: #ff6666;
            border-right-color: #cc0000;
            animation-duration: 4s;
            animation-direction: reverse;
        }
        @keyframes spinRing {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .v-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #cc0000, #660000);
            box-shadow: 0 0 60px rgba(204, 0, 0, 0.4), inset 0 0 30px rgba(255, 255, 255, 0.05);
            position: relative;
            animation: logoPulse 2.5s infinite alternate;
        }
        .v-logo span {
            font-size: 58px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            letter-spacing: -4px;
        }
        @keyframes logoPulse {
            0% {
                box-shadow: 0 0 40px rgba(204, 0, 0, 0.3);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 80px rgba(204, 0, 0, 0.6), 0 0 120px rgba(204, 0, 0, 0.2);
                transform: scale(1.02);
            }
        }

        .loader-title {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffffff 30%, #cc0000 70%, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradShift 3s ease-in-out infinite;
        }
        @keyframes gradShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .loader-sub {
            color: #666;
            font-size: 13px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #cc0000, #ff3333, #ff6666, #cc0000);
            background-size: 300% 100%;
            border-radius: 10px;
            transition: width 0.15s linear;
            animation: shimmer 1.5s infinite linear;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 1s infinite;
        }
        @keyframes shine {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        @keyframes shimmer {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 300% 0%;
            }
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 11px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .progress-label .pct {
            color: #cc0000;
            font-weight: 700;
            font-size: 13px;
        }

        /* ───────── TUTORIAL WRAPPER ───────── */
        #tutorialWrapper {
            display: none;
            width: 100%;
            max-width: 660px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        #tutorialWrapper.active {
            display: block;
            animation: wrapperIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes wrapperIn {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(40px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .tut-card {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 36px 32px 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            position: relative;
            overflow: hidden;
        }
        .tut-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #cc0000, #ff3333, #cc0000, transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }
        .tut-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(204, 0, 0, 0.03), transparent 70%);
            pointer-events: none;
        }

        .tut-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        .tut-step-indicator {
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .tut-step-indicator strong {
            color: #cc0000;
            font-weight: 700;
            font-size: 15px;
        }

        .tut-dots {
            display: flex;
            gap: 10px;
        }
        .tut-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .tut-dots span.active {
            background: #cc0000;
            transform: scale(1.3);
            box-shadow: 0 0 20px rgba(204, 0, 0, 0.4);
        }
        .tut-dots span.active::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(204, 0, 0, 0.2);
            animation: dotRipple 1.5s infinite;
        }
        @keyframes dotRipple {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* ─── TAB SLIDE CONTAINER ─── */
        .tut-body {
            min-height: 280px;
            padding: 4px 0 12px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        .tut-body > * {
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateX(30px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .tut-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px;
            color: #fff;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 60%, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tut-title .highlight {
            color: #cc0000;
            -webkit-text-fill-color: #cc0000;
        }

        .tut-text {
            color: #aaa;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 14px;
            font-weight: 400;
        }
        .tut-text strong {
            color: #fff;
            font-weight: 600;
        }

        /* ─── INFO CARDS ─── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0 12px;
        }
        .info-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 16px 18px;
            transition: all 0.3s ease;
        }
        .info-item:hover {
            border-color: rgba(204, 0, 0, 0.3);
            background: rgba(204, 0, 0, 0.04);
            transform: translateY(-2px);
        }
        .info-item .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .info-item .value {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }
        .info-item .value .muted {
            color: #666;
            font-weight: 400;
        }
        .info-full {
            grid-column: 1 / -1;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 14px 0 8px;
        }
        .feature-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .feature-badge:hover {
            border-color: rgba(204, 0, 0, 0.3);
            background: rgba(204, 0, 0, 0.05);
            transform: scale(1.02);
        }
        .feature-badge .icon {
            color: #cc0000;
            font-weight: 700;
            font-size: 16px;
        }

        /* ─── STATIC DEMO BOX ─── */
        .demo-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 12px 0 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .demo-box .label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .demo-box .value {
            font-weight: 600;
            color: #fff;
        }
        .demo-box .value .muted {
            color: #666;
            font-weight: 400;
        }

        .ready-badge {
            background: rgba(76, 175, 80, 0.08);
            border: 1px solid rgba(76, 175, 80, 0.15);
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #4caf50;
            font-size: 14px;
            margin-top: 8px;
        }
        .ready-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulseDot 1.5s infinite;
        }
        @keyframes pulseDot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.6);
            }
        }

        /* ─── ACCEPT BOX ─── */
        .accept-box {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 22px 0 18px;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .accept-box:hover {
            border-color: rgba(204, 0, 0, 0.3);
            background: rgba(204, 0, 0, 0.04);
        }
        .accept-box input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #cc0000;
            cursor: pointer;
            flex-shrink: 0;
            border-radius: 6px;
            transition: transform 0.2s;
        }
        .accept-box input[type="checkbox"]:checked {
            transform: scale(1.1);
        }
        .accept-box label {
            font-size: 15px;
            color: #bbb;
            cursor: pointer;
            user-select: none;
        }
        .accept-box label strong {
            color: #fff;
        }

        .btn-confirm {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #cc0000, #990000);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.3;
            pointer-events: none;
            position: relative;
            overflow: hidden;
        }
        .btn-confirm.enabled {
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 8px 30px rgba(204, 0, 0, 0.3);
        }
        .btn-confirm.enabled:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(204, 0, 0, 0.4);
            background: linear-gradient(135deg, #e60000, #aa0000);
        }
        .btn-confirm.enabled:active {
            transform: scale(0.97);
        }
        .btn-confirm::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .btn-confirm.enabled:hover::after {
            opacity: 1;
        }

        /* ─── NAVIGATION ─── */
        .tut-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 26px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 1;
        }
        .btn-nav {
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.3px;
        }
        .btn-nav:active {
            transform: scale(0.95);
        }
        .btn-prev {
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-prev:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateX(-3px);
        }
        .btn-next {
            background: linear-gradient(135deg, #cc0000, #990000);
            color: #fff;
            box-shadow: 0 4px 20px rgba(204, 0, 0, 0.25);
        }
        .btn-next:hover {
            transform: translateX(3px);
            box-shadow: 0 6px 30px rgba(204, 0, 0, 0.35);
        }

        .text-muted {
            color: #666;
            font-size: 13px;
        }
        .highlight-red {
            color: #cc0000;
            font-weight: 600;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 540px) {
            .tut-card {
                padding: 24px 18px 20px;
                border-radius: 20px;
            }
            .loader-title {
                font-size: 26px;
            }
            .v-logo {
                width: 76px;
                height: 76px;
            }
            .v-logo span {
                font-size: 42px;
            }
            .v-logo-ring {
                display: none;
            }
            .feature-grid,
            .info-grid {
                grid-template-columns: 1fr;
            }
            .tut-title {
                font-size: 20px;
            }
            .tut-nav {
                flex-wrap: wrap;
                gap: 12px;
            }
            .btn-nav {
                flex: 1;
                text-align: center;
                padding: 12px 16px;
                font-size: 13px;
            }
            .demo-box {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .accept-box {
                padding: 14px 16px;
            }
            .tut-header {
                flex-wrap: wrap;
                gap: 10px;
            }
        }

        @media (max-width: 400px) {
            .tut-card {
                padding: 18px 12px 16px;
            }
            .loader-title {
                font-size: 22px;
            }
            .v-logo {
                width: 64px;
                height: 64px;
            }
            .v-logo span {
                font-size: 34px;
            }
            .btn-nav {
                padding: 10px 12px;
                font-size: 12px;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

    <!-- ─── ANIMATED BACKGROUND ─── -->
    <div class="bg-canvas">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- ═══════════════ LOADING SCREEN ═══════════════ -->
    <div id="loadingWrapper">
        <div class="loader-content">
            <div class="v-logo-wrap">

                <div class="v-logo-ring"></div>

            <div class="tut-body" id="tutBody">

            <div class="tut-nav">
                <button class="btn-nav btn-prev" id="prevBtn">← Back</button>
                <button class="btn-nav btn-next" id="nextBtn">Next →</button>
            </div>

        </div>
    </div>

    <script>

        // ═══════════════════════════════════════════════════════════

                    <div class="feature-badge"><span class="icon">⚡</span> Ultra‑fast</div>

        }, {

        // ═══════════════════════════════════════════════════════════
        //  STATE
        // ═══════════════════════════════════════════════════════════

        let currentTab = 0;

        const loadingWrapper = document.getElementById('loadingWrapper');
        const tutorialWrapper = document.getElementById('tutorialWrapper');
        const progressFill = document.getElementById('progressFill');
        const progressPct = document.getElementById('progressPct');
        const stepNum = document.getElementById('stepNum');
        const dotsContainer = document.getElementById('dotsContainer');
        const tutBody = document.getElementById('tutBody');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // ═══════════════════════════════════════════════════════════
        //  LOADING
        // ═══════════════════════════════════════════════════════════

        function simulateLoading() {
            const duration = 2800;
            const interval = 40;
            const steps = duration / interval;
            let step = 0;

            const timer = setInterval(() => {
                step++;
                const pct = Math.min(100, Math.round((step / steps) * 100));
                progressFill.style.width = pct + '%';
                progressPct.textContent = pct + '%';

                if (pct >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        loadingWrapper.classList.add('hidden');
                        tutorialWrapper.classList.add('active');
                        renderTab(0);
                    }, 500);
                }
            }, interval);
        }

        // ═══════════════════════════════════════════════════════════
        //  RENDER
        // ═══════════════════════════════════════════════════════════

        function renderTab(index) {
            const tab = tabs[index];
            if (!tab) return;

            stepNum.textContent = index + 1;
            const dots = dotsContainer.querySelectorAll('span');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            tutBody.innerHTML = tab.render();

            prevBtn.style.display = index === 0 ? 'none' : 'inline-block';
            nextBtn.textContent = index === tabs.length - 1 ? '🏁 Finish' : 'Next →';

            if (index === 3) {
                const acceptCheck = document.getElementById('acceptCheck');
                const confirmBtn = document.getElementById('confirmBtn');
                const acceptBox = document.getElementById('acceptBox');

                function updateConfirm() {
                    if (acceptCheck && acceptCheck.checked) {
                        confirmBtn.classList.add('enabled');
                    } else {
                        confirmBtn.classList.remove('enabled');
                    }
                }

                if (acceptCheck) {
                    acceptCheck.onchange = updateConfirm;
                    if (acceptBox) {
                        acceptBox.onclick = function(e) {
                            if (e.target.tagName !== 'INPUT') {
                                acceptCheck.checked = !acceptCheck.checked;
                                updateConfirm();
                            }
                        };
                    }
                }

                if (confirmBtn) {
                    confirmBtn.onclick = function() {
                        if (acceptCheck && acceptCheck.checked) {
                            confirmBtn.textContent = '⏳ Redirecting...';
                            confirmBtn.classList.remove('enabled');
                            confirmBtn.style.opacity = '0.6';
                            setTimeout(() => {
                                window.location.href = '/dashboard.html';
                            }, 800);
                        }
                    };
                }

                updateConfirm();
            }
        }

        // ── Navigation ──
        function goToTab(index) {
            if (index < 0 || index >= tabs.length) return;
            currentTab = index;
            renderTab(index);
        }

        prevBtn.onclick = () => { if (currentTab > 0) goToTab(currentTab - 1); };

        nextBtn.onclick = () => {
            if (currentTab < tabs.length - 1) {
                goToTab(currentTab + 1);
            } else {
                const btn = document.getElementById('confirmBtn');
                if (btn) btn.click();
            }
        };

        document.addEventListener('keydown', (e) => {
            if (!tutorialWrapper.classList.contains('active')) return;
            if (e.key === 'ArrowRight' || e.key === 'Enter') {
                e.preventDefault();
                nextBtn.click();
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevBtn.click();
            }
        });

        // ═══════════════════════════════════════════════════════════
        //  START
        // ═══════════════════════════════════════════════════════════

        simulateLoading();
    </script>
