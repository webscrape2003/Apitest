<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAJIRA MD LITE · Tutorial</title>
    <style>
        /* ───────── RESET & BASE ───────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ───────── LOADING WRAPPER ───────── */
        #loadingWrapper {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }
        #loadingWrapper.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-content {
            text-align: center;
            max-width: 420px;
            width: 90%;
        }

        .v-logo {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #cc0000, #880000);
            box-shadow: 0 0 50px rgba(204, 0, 0, 0.5);
            margin-bottom: 20px;
            animation: pulseGlow 2s infinite alternate;
        }
        .v-logo span {
            font-size: 54px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: -4px;
        }
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 40px rgba(204, 0, 0, 0.4);
            }
            100% {
                box-shadow: 0 0 80px rgba(204, 0, 0, 0.7);
            }
        }

        .loader-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 40%, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .loader-sub {
            color: #888;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.6);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #cc0000, #ff3333, #cc0000);
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.15s linear;
            animation: shimmer 1.2s infinite linear;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
            color: #777;
            letter-spacing: 1px;
        }
        .progress-label .pct {
            color: #cc0000;
            font-weight: 700;
        }

        /* ───────── TUTORIAL WRAPPER ───────── */
        #tutorialWrapper {
            display: none;
            width: 100%;
            max-width: 640px;
            padding: 20px;
            animation: fadeUp 0.6s ease;
        }
        #tutorialWrapper.active {
            display: block;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tut-card {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 32px 28px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }
        .tut-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #cc0000, #ff3333, #cc0000);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }

        .tut-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }
        .tut-step-indicator {
            font-size: 13px;
            color: #888;
            letter-spacing: 1px;
        }
        .tut-step-indicator strong {
            color: #cc0000;
            font-weight: 700;
        }
        .tut-dots {
            display: flex;
            gap: 8px;
        }
        .tut-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2a2a2a;
            transition: background 0.3s, transform 0.3s;
        }
        .tut-dots span.active {
            background: #cc0000;
            transform: scale(1.25);
            box-shadow: 0 0 12px rgba(204, 0, 0, 0.5);
        }

        .tut-body {
            min-height: 280px;
            padding: 6px 0 12px;
        }

        .tut-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #fff;
        }
        .tut-title .highlight {
            color: #cc0000;
        }

        .tut-text {
            color: #bbb;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 12px;
        }
        .tut-text strong {
            color: #fff;
        }

        /* ─── STATIC INFO CARDS ─── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 16px 0 12px;
        }
        .info-item {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 14px 16px;
        }
        .info-item .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 4px;
        }
        .info-item .value {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }
        .info-item .value .muted {
            color: #888;
            font-weight: 400;
        }

        .info-full {
            grid-column: 1 / -1;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 12px 0 6px;
        }
        .feature-badge {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 13px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color 0.3s, background 0.3s;
        }
        .feature-badge .icon {
            color: #cc0000;
            font-weight: 700;
        }

        /* ─── CHECKBOX & CONFIRM (LAST TAB) ─── */
        .accept-box {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 22px 0 18px;
            padding: 16px 20px;
            background: #1a1a1a;
            border-radius: 14px;
            border: 1px solid #2a2a2a;
            transition: border 0.3s, background 0.3s;
            cursor: pointer;
        }
        .accept-box:hover {
            border-color: #cc0000;
            background: #1e1e1e;
        }
        .accept-box input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #cc0000;
            cursor: pointer;
            flex-shrink: 0;
        }
        .accept-box label {
            font-size: 15px;
            color: #ccc;
            cursor: pointer;
            user-select: none;
        }
        .accept-box label strong {
            color: #fff;
        }

        .btn-confirm {
            width: 100%;
            padding: 14px;
            background: #cc0000;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s, opacity 0.3s;
            opacity: 0.3;
            pointer-events: none;
        }
        .btn-confirm.enabled {
            opacity: 1;
            pointer-events: auto;
        }
        .btn-confirm.enabled:hover {
            background: #e60000;
        }
        .btn-confirm.enabled:active {
            transform: scale(0.97);
        }

        /* ─── NAVIGATION ─── */
        .tut-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #222;
        }
        .btn-nav {
            padding: 10px 26px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s;
        }
        .btn-nav:active {
            transform: scale(0.96);
        }
        .btn-prev {
            background: #222;
            color: #aaa;
        }
        .btn-prev:hover {
            background: #2e2e2e;
            color: #fff;
        }
        .btn-next {
            background: #cc0000;
            color: #fff;
        }
        .btn-next:hover {
            background: #e60000;
        }

        .text-muted {
            color: #666;
            font-size: 13px;
        }
        .highlight-red {
            color: #cc0000;
        }

        @media (max-width: 500px) {
            .tut-card {
                padding: 22px 16px 20px;
            }
            .loader-title {
                font-size: 24px;
            }
            .v-logo {
                width: 70px;
                height: 70px;
            }
            .v-logo span {
                font-size: 42px;
            }
            .feature-grid,
            .info-grid {
                grid-template-columns: 1fr;
            }
            .tut-title {
                font-size: 19px;
            }
            .tut-nav {
                flex-wrap: wrap;
                gap: 10px;
            }
            .btn-nav {
                flex: 1;
                text-align: center;
                padding: 10px 14px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

    <!-- ═══════════════ LOADING SCREEN ═══════════════ -->
    <div id="loadingWrapper">
        <div class="loader-content">
            <div class="v-logo"><span>V</span></div>
            <div class="loader-title">VAJIRA MD LITE</div>
            <div class="loader-sub">WhatsApp Bot · Tutorial</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-label">
                <span>INITIALIZING</span>
                <span class="pct" id="progressPct">0%</span>
            </div>
        </div>
    </div>

    <!-- ═══════════════ TUTORIAL ═══════════════ -->
    <div id="tutorialWrapper">
        <div class="tut-card">

            <!-- header -->
            <div class="tut-header">
                <span class="tut-step-indicator">STEP <strong id="stepNum">1</strong> / 4</span>
                <div class="tut-dots" id="dotsContainer">
                    <span class="active"></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <!-- body -->
            <div class="tut-body" id="tutBody">
                <!-- dynamically rendered -->
            </div>

            <!-- navigation -->
            <div class="tut-nav">
                <button class="btn-nav btn-prev" id="prevBtn">← Back</button>
                <button class="btn-nav btn-next" id="nextBtn">Next →</button>
            </div>

        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  DATA — all info is static; only the final checkbox + confirm is interactive
        // ═══════════════════════════════════════════════════════════

        const tabs = [{
            id: 'about',
            title: 'About VAJIRA MD',
            render: () => `
                <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
                    <div style="width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #cc0000, #880000);display:flex;justify-content:center;align-items:center;flex-shrink:0;box-shadow:0 0 30px rgba(204,0,0,0.3);">
                        <span style="font-size:34px;font-weight:900;color:#fff;">V</span>
                    </div>
                    <div>
                        <div style="font-size:20px;font-weight:700;">VAJIRA MD LITE</div>
                        <div style="color:#888;font-size:13px;">WhatsApp Automation Bot</div>
                    </div>
                </div>
                <div class="tut-text">
                    <strong>Developer:</strong> Vajira Rathnayaka &nbsp;·&nbsp; <strong>Age:</strong> 23 &nbsp;·&nbsp; <strong>Village:</strong> Balangoda<br>
                    <strong>Country:</strong> Sri Lanka &nbsp;·&nbsp; <strong>Version:</strong> 2.4.0<br><br>
                    VAJIRA MD LITE is a powerful WhatsApp automation bot built with <strong>Node.js</strong> and the
                    <strong>Baileys</strong> library. It handles auto‑reply, media sending, voice notes, TikTok
                    downloads, and much more — all from your WhatsApp number.
                </div>
                <div class="feature-grid">
                    <div class="feature-badge"><span class="icon">⚡</span> Ultra‑fast</div>
                    <div class="feature-badge"><span class="icon">🔒</span> Secure</div>
                    <div class="feature-badge"><span class="icon">🎵</span> Auto Voice</div>
                    <div class="feature-badge"><span class="icon">📱</span> Multi‑device</div>
                    <div class="feature-badge"><span class="icon">📊</span> Analytics</div>
                    <div class="feature-badge"><span class="icon">🔄</span> Auto‑Retry</div>
                </div>
                <div class="tut-text" style="font-size:13px;color:#666;margin-top:10px;">
                    💡 This tutorial shows you how each feature works — all information is for demonstration.
                </div>
            `
        }, {
            id: 'settings',
            title: 'Bot Settings & OTP Login',
            render: () => `
                <div class="tut-text" style="margin-bottom:14px;">
                    To start using the bot, connect your WhatsApp number. The login process uses OTP:
                </div>
                <div style="background:#1a1a1a;border-radius:12px;padding:16px;border-left:3px solid #cc0000;margin-bottom:16px;">
                    <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:space-between;">
                        <div><span style="color:#888;">📞 Connected Number</span><br><span style="font-weight:600;">+94 71 234 5678</span> <span class="text-muted">(example)</span></div>
                        <div><span style="color:#888;">🔐 OTP Code</span><br><span style="font-weight:600;">123456</span> <span class="text-muted">(demo)</span></div>
                    </div>
                </div>
                <div class="tut-text">
                    <strong>How the OTP flow works:</strong><br>
                    1. Enter your WhatsApp number (with country code).<br>
                    2. Tap <span class="highlight-red">Request OTP</span> — a 6‑digit code is sent to your WhatsApp.<br>
                    3. Enter the received code to verify and log in.<br><br>
                    Once logged in, the bot stores your session for uninterrupted use.
                </div>
                <div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;">
                    <span class="feature-badge" style="flex:1;"><span class="icon">🎤</span> Auto Voice</span>
                    <span class="feature-badge" style="flex:1;"><span class="icon">📨</span> Auto Reply</span>
                    <span class="feature-badge" style="flex:1;"><span class="icon">📊</span> Analytics</span>
                </div>
            `
        }, {
            id: 'autosender',
            title: 'Auto Sender · Song & TikTok',
            render: () => `
                <div class="tut-text" style="margin-bottom:14px;">
                    Configure automated sending of <strong>songs</strong> or <strong>TikTok</strong> content.
                    The bot sends media to any JID with your custom settings.
                </div>
                <div class="info-grid">
                    <div class="info-item"><div class="label">Sender Number</div><div class="value">+94 71 234 5678</div></div>
                    <div class="info-item"><div class="label">Auto Sender Type</div><div class="value">🎵 Audio / Song</div></div>
                    <div class="info-item info-full"><div class="label">Location (JID ID)</div><div class="value">94712345678@s.whatsapp.net <span class="muted">(target)</span></div></div>
                    <div class="info-item info-full"><div class="label">Caption</div><div class="value">Check this out! 🔥</div></div>
                    <div class="info-item"><div class="label">Audio Quality</div><div class="value">Medium</div></div>
                    <div class="info-item"><div class="label">Interval (sec)</div><div class="value">30</div></div>
                    <div class="info-item info-full"><div class="label">Keywords (comma separated)</div><div class="value">music, viral</div></div>
                </div>
                <div style="background:#1a1a1a;border-radius:10px;padding:12px 16px;border:1px solid #2a2a2a;margin-top:6px;display:flex;align-items:center;gap:10px;color:#4caf50;font-size:14px;">
                    <span>📤</span> Ready to send — all settings are saved in this demo
                </div>
                <div class="tut-text" style="margin-top:12px;font-size:13px;color:#888;">
                    <strong>Note:</strong> To use this feature, first log in with your number (OTP step). The bot will then use the configured sender number.
                </div>
            `
        }, {
            id: 'privacy',
            title: 'Privacy & Safety',
            render: () => `
                <div class="tut-text" style="margin-bottom:10px;">
                    <strong>🛡️ VAJIRA MD</strong> is built with <strong>privacy</strong> and
                    <strong>ultra‑fast</strong> performance. Your data stays secure.
                </div>
                <div class="feature-grid" style="margin-bottom:18px;">
                    <div class="feature-badge"><span class="icon">🚫</span> Anti‑Ban</div>
                    <div class="feature-badge"><span class="icon">⚡</span> Ultra‑Fast</div>
                    <div class="feature-badge"><span class="icon">🔐</span> End‑to‑End</div>
                    <div class="feature-badge"><span class="icon">🔄</span> Auto‑Retry</div>
                    <div class="feature-badge"><span class="icon">🛡️</span> No Logs</div>
                    <div class="feature-badge"><span class="icon">📡</span> 99.9% Uptime</div>
                </div>
                <div class="tut-text" style="font-size:14px;color:#999;margin-bottom:8px;">
                    ✅ By accepting, you agree that you own the connected number and will use this bot responsibly.
                </div>

                <!-- Checkbox + Confirm (exactly as requested) -->
                <div class="accept-box" id="acceptBox">
                    <input type="checkbox" id="acceptCheck">
                    <label for="acceptCheck">I accept the <strong>Terms of Service</strong> and <strong>Privacy Policy</strong></label>
                </div>

                <button class="btn-confirm" id="confirmBtn">✅ Confirm & Open Dashboard</button>
                <div style="margin-top:10px;font-size:12px;color:#555;text-align:center;">
                    ⚡ Dashboard will open at <span style="color:#888;">/dashboard.html</span>
                </div>
            `
        }];

        // ═══════════════════════════════════════════════════════════
        //  STATE
        // ═══════════════════════════════════════════════════════════

        let currentTab = 0;
        let loadingComplete = false;

        // ── DOM refs ──
        const loadingWrapper = document.getElementById('loadingWrapper');
        const tutorialWrapper = document.getElementById('tutorialWrapper');
        const progressFill = document.getElementById('progressFill');
        const progressPct = document.getElementById('progressPct');
        const stepNum = document.getElementById('stepNum');
        const dotsContainer = document.getElementById('dotsContainer');
        const tutBody = document.getElementById('tutBody');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // ═══════════════════════════════════════════════════════════
        //  LOADING
        // ═══════════════════════════════════════════════════════════

        function simulateLoading() {
            const duration = 2800;
            const interval = 40;
            const steps = duration / interval;
            let step = 0;

            const timer = setInterval(() => {
                step++;
                const pct = Math.min(100, Math.round((step / steps) * 100));
                progressFill.style.width = pct + '%';
                progressPct.textContent = pct + '%';

                if (pct >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        loadingWrapper.classList.add('hidden');
                        tutorialWrapper.classList.add('active');
                        loadingComplete = true;
                        renderTab(0);
                    }, 400);
                }
            }, interval);
        }

        // ═══════════════════════════════════════════════════════════
        //  RENDER TUTORIAL
        // ═══════════════════════════════════════════════════════════

        function renderTab(index) {
            const tab = tabs[index];
            if (!tab) return;

            // update step & dots
            stepNum.textContent = index + 1;
            const dots = dotsContainer.querySelectorAll('span');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            // render body
            tutBody.innerHTML = tab.render();

            // nav buttons
            prevBtn.style.display = index === 0 ? 'none' : 'inline-block';
            nextBtn.textContent = index === tabs.length - 1 ? '🏁 Finish' : 'Next →';

            // ─── Wire up the checkbox + confirm on the last tab ───
            if (index === 3) {
                const acceptCheck = document.getElementById('acceptCheck');
                const confirmBtn = document.getElementById('confirmBtn');
                const acceptBox = document.getElementById('acceptBox');

                function updateConfirm() {
                    if (acceptCheck && acceptCheck.checked) {
                        confirmBtn.classList.add('enabled');
                    } else {
                        confirmBtn.classList.remove('enabled');
                    }
                }

                if (acceptCheck) {
                    acceptCheck.onchange = updateConfirm;
                    if (acceptBox) {
                        acceptBox.onclick = function(e) {
                            if (e.target.tagName !== 'INPUT') {
                                acceptCheck.checked = !acceptCheck.checked;
                                updateConfirm();
                            }
                        };
                    }
                }

                if (confirmBtn) {
                    confirmBtn.onclick = function() {
                        if (acceptCheck && acceptCheck.checked) {
                            confirmBtn.textContent = '⏳ Redirecting...';
                            confirmBtn.classList.remove('enabled');
                            confirmBtn.style.opacity = '0.7';
                            setTimeout(() => {
                                // As per request: open dashboard at /dashboard.html
                                window.location.href = '/dashboard.html';
                                // Fallback if redirect doesn't work (for demo environments)
                                // alert('✅ Redirecting to /dashboard.html');
                                // window.location.href = '/dashboard.html';
                            }, 800);
                        }
                    };
                }

                // initial state
                updateConfirm();
            }
        }

        // ── Navigation ──
        function goToTab(index) {
            if (index < 0 || index >= tabs.length) return;
            currentTab = index;
            renderTab(index);
        }

        prevBtn.onclick = function() {
            if (currentTab > 0) goToTab(currentTab - 1);
        };

        nextBtn.onclick = function() {
            if (currentTab < tabs.length - 1) {
                goToTab(currentTab + 1);
            } else {
                // on last tab, trigger dashboard button if checked
                const btn = document.getElementById('confirmBtn');
                if (btn) btn.click();
            }
        };

        // ── Keyboard support ──
        document.addEventListener('keydown', (e) => {
            if (!tutorialWrapper.classList.contains('active')) return;
            if (e.key === 'ArrowRight' || e.key === 'Enter') {
                e.preventDefault();
                nextBtn.click();
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevBtn.click();
            }
        });

        // ═══════════════════════════════════════════════════════════
        //  START
        // ═══════════════════════════════════════════════════════════

        simulateLoading();
    </script>
</body>
</html>
